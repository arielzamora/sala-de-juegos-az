<div class="container d-flex justify-content-center align-items-center py-5">
  <div class="premium-card p-5" style="max-width: 450px; width: 100%;">
    <div class="text-center mb-4">
      <h2 class="fw-bold">Iniciar Sesión</h2>
      <p class="text-secondary">Ingresa a tu cuenta para jugar</p>
    </div>

    <form [formGroup]="loginForm" (ngSubmit)="onLogin()">
      <div class="mb-3">
        <label for="email" class="form-label">Correo Electrónico</label>
        <input type="email" class="form-control bg-dark text-white border-secondary" id="email" formControlName="email" placeholder="ejemplo@correo.com">
        @if (loginForm.get('email')?.invalid && loginForm.get('email')?.touched) {
          <div class="text-danger small mt-1">Correo inválido.</div>
        }
      </div>
      <div class="mb-4">
        <label for="pass" class="form-label">Contraseña</label>
        <input type="password" class="form-control bg-dark text-white border-secondary" id="pass" formControlName="pass" placeholder="******">
        @if (loginForm.get('pass')?.invalid && loginForm.get('pass')?.touched) {
          <div class="text-danger small mt-1">Contraseña requerida.</div>
        }
      </div>

      <button type="submit" class="btn btn-primary w-100 py-2 mb-4" [disabled]="isLoading || loginForm.invalid">
        @if (isLoading) {
          <span class="spinner-border spinner-border-sm me-2" role="status" aria-hidden="true"></span>
        }
        Ingresar
      </button>

      <div class="mt-3">
        <p class="text-secondary text-center small mb-2">Logueo Rápido</p>
        <div class="d-flex justify-content-between gap-2">
          <button type="button" class="btn btn-sm btn-outline-info w-100" (click)="fastLogin('admin')" [disabled]="isLoading">Admin</button>
          <button type="button" class="btn btn-sm btn-outline-warning w-100" (click)="fastLogin('invitado')" [disabled]="isLoading">Invitado</button>
          <button type="button" class="btn btn-sm btn-outline-success w-100" (click)="fastLogin('tester')" [disabled]="isLoading">Tester</button>
        </div>
      </div>
    </form>
  </div>
</div>
